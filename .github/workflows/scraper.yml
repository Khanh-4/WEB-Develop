name: Scraper Cron

on:
  schedule:
    - cron: '0 1,13 * * *'   # 08:00 và 20:00 giờ Việt Nam (UTC+7)
  workflow_dispatch:           # Chạy thủ công từ GitHub Actions UI

concurrency:
  group: scraper
  cancel-in-progress: false    # Không cancel job đang chạy nếu trigger lại

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # Mỗi source ~25-40 phút; 90 phút dư dả
    strategy:
      fail-fast: false         # Nếu 1 source fail, 2 source còn lại vẫn chạy
      matrix:
        source: [phongvu, ttgshop, gearvn]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: scraper

      - name: Run scraper (${{ matrix.source }})
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python main.py --source ${{ matrix.source }}
        working-directory: scraper
