name: Scraper Cron

on:
  schedule:
    - cron: '0 1,13 * * *'   # 08:00 và 20:00 giờ Việt Nam (UTC+7)
  workflow_dispatch:           # Chạy thủ công từ GitHub Actions UI

concurrency:
  group: scraper
  cancel-in-progress: false    # Không cancel job đang chạy nếu trigger lại

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # Full scrape ~25 phút; 60 phút dư dả

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: scraper

      - name: Run scraper (all sources, all categories)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python main.py
        working-directory: scraper
